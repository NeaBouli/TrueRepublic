name: Security Scan

on:
  schedule:
    - cron: '0 3 * * 1'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          CGO_ENABLED=1 govulncheck ./... 2>&1 | tee govulncheck.txt || true
          # Fail on every reachable vulnerability with an available fix.
          FIXABLE=$(grep "Fixed in:" govulncheck.txt | grep -v "N/A" || true)
          if [ -n "$FIXABLE" ]; then
            echo "::error::Fixable vulnerabilities found:"
            echo "$FIXABLE"
            exit 1
          fi
          echo "No reachable vulnerability with an available fix remains"

  rust-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  node-audit-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-web
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  node-audit-legacy-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-wallet
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

  node-audit-legacy-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-wallet
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true
