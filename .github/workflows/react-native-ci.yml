name: Mobile Wallet CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'mobile-wallet/**'
      - '.github/workflows/react-native-ci.yml'
  pull_request:
    paths:
      - 'mobile-wallet/**'
      - '.github/workflows/react-native-ci.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-wallet
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npx jest --passWithNoTests
