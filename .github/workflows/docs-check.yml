name: Docs Consistency Check

on:
  pull_request:
    paths:
      - 'README.md'
      - 'CLAUDE.md'
      - 'docs/**'
      - 'scripts/check-consistency.sh'
      - '.github/workflows/docs-check.yml'
      - 'wiki-github/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check Consistency
        run: ./scripts/check-consistency.sh
